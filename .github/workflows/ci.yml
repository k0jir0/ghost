name: CI

# Shift-left: run on every push and every pull-request targeting main.
# Three independent jobs must all be green before a PR can merge.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: .

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint & type-check
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: ruff lint
        run: ruff check src/ghost agents/

      - name: ruff format check
        run: ruff format --check src/ghost agents/

      - name: mypy strict type-check
        run: mypy --ignore-missing-imports --strict src/ghost/

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 — Test suite with coverage enforcement
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies (no heavy ML)
        # Install only the package metadata + dev extras.
        # torch / tensorflow / ollama / mcp are all mocked in conftest.py,
        # so we skip the multi-GB installs in CI.
        run: |
          python -m pip install --no-deps -e .
          python -m pip install \
            "pydantic>=2.0.0" \
            "pydantic-settings>=2.0.0" \
            "structlog>=24.0.0" \
            "python-dotenv>=1.0.0" \
            "pytest>=8.0.0" \
            "pytest-asyncio>=0.23.0" \
            "pytest-cov>=4.0.0"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=src/ghost \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3 — Security scanning
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tools
        run: python -m pip install bandit pip-audit

      - name: Bandit — static security analysis
        # Scan source + agent code; skip test stubs
        run: |
          python -m bandit \
            --recursive src/ghost/ agents/ \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json \
            || (cat bandit-report.json && exit 1)

      - name: pip-audit — dependency CVE scan
        # Audit only the lightweight third-party dependencies used in CI.
        # The local `ghost` package is not published on PyPI, so auditing the
        # ambient environment would fail on the editable install itself.
        run: |
          cat > audit-requirements.txt <<'EOF'
          pydantic>=2.0.0
          pydantic-settings>=2.0.0
          psutil>=5.9.0
          structlog>=24.0.0
          python-dotenv>=1.0.0
          EOF
          python -m pip install -r audit-requirements.txt
          pip-audit --strict -r audit-requirements.txt

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14
